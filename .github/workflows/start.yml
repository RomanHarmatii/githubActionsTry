name: Tests
run-name: Tests run
on: workflow_dispatch
jobs:
  firstJob:
    name: "Run tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - name: Npm install
        run: npm install
      - name: run tests
        run: npm run cy:run
